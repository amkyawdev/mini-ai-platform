<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Mini AI Platform</title>
    
    <!-- Bulma CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/style.css">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../assets/logo.svg">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <img src="../assets/logo.svg" alt="Mini AI Platform" onerror="this.style.display='none'">
            </div>
            
            <h1 class="auth-title">Welcome to Mini AI</h1>
            <p class="auth-subtitle">Lightweight AI platform with knowledge engine integration</p>
            
            <button class="login-btn" id="login-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 8px;">
                    <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3"/>
                </svg>
                Sign In
            </button>
            
            <div class="mt-3">
                <p class="text-muted" style="font-size: 12px;">
                    One-click login • No password required
                </p>
            </div>
        </div>
    </div>
    
    <!-- JavaScript -->
    <script src="../config/config.js"></script>
    <script src="../js/auth.js"></script>
    
    <script>
        // Login functionality
        document.getElementById('login-btn').addEventListener('click', () => {
            // Simple one-click login
            Auth.login('User');
            
            // Redirect to chat page
            window.location.href = '../pages/chat.html';
        });
        
        // Check if already logged in
        if (Auth.isLoggedIn()) {
            window.location.href = '../pages/chat.html';
        }
    </script>
</body>
</html>
