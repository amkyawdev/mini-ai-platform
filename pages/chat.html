<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - AmkyawDev AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="app-wrapper">
        <div class="sidebar-overlay" id="sidebar-overlay"></div>
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" id="new-chat-btn"><i class="bi bi-plus-lg"></i> New Chat</button>
            </div>
            <nav class="sidebar-nav">
                <p class="sidebar-label">Navigation</p>
                <ul class="sidebar-menu">
                    <li class="sidebar-menu-item"><a href="chat.html" class="sidebar-link active"><i class="bi bi-chat-dots"></i> Chat</a></li>
                    <li class="sidebar-menu-item"><a href="docs.html" class="sidebar-link"><i class="bi bi-book"></i> Docs</a></li>
                    <li class="sidebar-menu-item"><a href="tools.html" class="sidebar-link"><i class="bi bi-gear"></i> Tools</a></li>
                    <li class="sidebar-menu-item"><a href="knowledge.html" class="sidebar-link"><i class="bi bi-journal-text"></i> Knowledge</a></li>
                    <li class="sidebar-menu-item"><a href="create_api.html" class="sidebar-link"><i class="bi bi-key"></i> API Builder</a></li>
                    <li class="sidebar-menu-item"><a href="about.html" class="sidebar-link"><i class="bi bi-info-circle"></i> About</a></li>
                </ul>
                <p class="sidebar-label">Recent Chats</p>
                <ul class="sidebar-menu" id="chat-history-list"></ul>
            </nav>
            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="user-avatar" id="user-avatar">U</div>
                    <span class="user-name" id="user-name">User</span>
                    <button class="header-btn" onclick="openSettings()"><i class="bi bi-gear"></i></button>
                    <button class="header-btn" onclick="logout()"><i class="bi bi-box-arrow-right"></i></button>
                </div>
            </div>
        </aside>
        <main class="main-content">
            <header class="top-header">
                <div class="d-flex align-items-center gap-3">
                    <button class="header-btn d-lg-none" id="menu-toggle" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
                    <div class="header-brand">
                        <div class="brand-icon"><i class="bi bi-robot"></i></div>
                        <span class="brand-text"><span>AmkyawDev</span> AI</span>
                    </div>
                </div>
                <div class="header-actions">
                    <span id="ai-name">AmkyawDev AI</span>
                    <button class="header-btn" onclick="openSettings()"><i class="bi bi-gear"></i></button>
                </div>
            </header>
            <div class="chat-container">
                <div class="chat-messages" id="chat-messages"></div>
                <div class="chat-input-container">
                    <div class="chat-input-wrapper">
                        <textarea class="chat-input" id="chat-input" placeholder="Send a message..." rows="1"></textarea>
                        <button class="send-btn" id="send-btn"><i class="bi bi-send"></i></button>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <div class="modal fade" id="settings-modal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content" style="background:var(--bg-card);border:1px solid var(--border)">
                <div class="modal-header" style="border-bottom:1px solid var(--border)">
                    <h5 class="modal-title">Settings</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3"><label class="form-label">AI Name</label><input type="text" class="form-control" id="settings-ai-name"></div>
                    <div class="mb-3"><label class="form-label">API Provider</label><select class="form-control" id="settings-api-provider"><option value="groq">Groq</option><option value="openrouter">OpenRouter</option></select></div>
                    <div class="mb-3"><label class="form-label">API Key</label><input type="password" class="form-control" id="settings-api-key"></div>
                </div>
                <div class="modal-footer" style="border-top:1px solid var(--border)">
                    <button class="btn btn-danger" onclick="clearAllData();logout();">Clear All & Logout</button>
                    <button class="btn btn-outline" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-accent" onclick="saveSettings()">Save</button>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/memory.js"></script>
    <script src="../js/chat-manager.js"></script>
    <script>
        function openSettings(){var m=new bootstrap.Modal(document.getElementById("settings-modal"));var p=getPreferences();document.getElementById("settings-ai-name").value=p.aiName||"AmkyawDev AI";document.getElementById("settings-api-provider").value=p.apiProvider||"groq";document.getElementById("settings-api-key").value=p.apiKey||"";m.show();}
        function saveSettings(){var p={aiName:document.getElementById("settings-ai-name").value,apiProvider:document.getElementById("settings-api-provider").value,apiKey:document.getElementById("settings-api-key").value};savePreferences(p);var m=bootstrap.Modal.getInstance(document.getElementById("settings-modal"));m.hide();document.getElementById("ai-name").textContent=p.aiName;}
        document.addEventListener("DOMContentLoaded",function(){requireAuth();initChat();});
    </script>
</body>
</html>
