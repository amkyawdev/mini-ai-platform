<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - AmkyawDev</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/panda.css">
</head>
<body>
    <div class="app-container" x-data x-init="$store.app.init()">
        <!-- Sidebar (Left) -->
        <aside class="sidebar" :class="{hidden:!$store.app.sidebarOpen}">
            <button class="new-chat-btn" onclick="newChat()"><i class="bi bi-plus"></i> New Chat</button>
            <nav class="sidebar-nav">
                <p class="nav-label">Navigation</p>
                <a href="chat.html" class="sidebar-link active"><i class="bi bi-chat-dots"></i> Chat</a>
                <a href="docs.html" class="sidebar-link"><i class="bi bi-book"></i> Docs</a>
                <a href="about.html" class="sidebar-link"><i class="bi bi-info-circle"></i> About</a>
            </nav>
            <div class="chat-history">
                <p class="history-label">Recent</p>
                <template x-for="(c,i) in $store.app.chatHistory" :key="i">
                    <div class="history-item" :data-index="i" onclick="loadChat(this.dataset.index)">
                        <span x-text="c.title"></span>
                        <button class="delete-btn" onclick="delChat(this.parentElement.dataset.index,event)"><i class="bi bi-x"></i></button>
                    </div>
                </template>
            </div>
            <div class="sidebar-footer">
                <a href="settings.html" class="settings-btn"><i class="bi bi-gear"></i> Settings</a>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="main-content" :class="{'sidebar-collapsed':!$store.app.sidebarOpen}">
            <!-- Header -->
            <header class="header">
                <button class="menu-btn" onclick="toggleSidebar()">☰</button>
                <span class="chat-title" x-text="$store.app.loadSettings().aiName || 'Chat'"></span>
                <div class="header-spacer"></div>
                <button class="menu-btn" onclick="toggleAside()">☱</button>
            </header>
            
            <!-- Messages -->
            <div class="chat-messages" id="chatMessages">
                <template x-for="(m,i) in $store.app.messages" :key="i">
                    <div class="message" :class="m.role">
                        <div class="message-avatar" :class="m.role"><span x-text="m.role==='user'?'👤':'🤖'"></span></div>
                        <div class="message-content">
                            <div class="message-bubble" x-text="m.content"></div>
                            <div class="message-time" x-text="new Date(m.time).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})"></div>
                        </div>
                    </div>
                </template>
                <div x-show="$store.app.messages.length===0" style="text-align:center;padding:60px;color:var(--text-secondary)">
                    <h3>How can I help you today?</h3>
                </div>
            </div>
            
            <!-- Input -->
            <div class="input-container" :class="{expanded:!$store.app.sidebarOpen}">
                <div class="input-wrapper">
                    <button class="upload-btn">×</button>
                    <textarea class="chat-input" id="chatInput" placeholder="Type message..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()">ᐷ</button>
                </div>
            </div>
        </main>
        
        <!-- Aside (Right) -->
        <aside class="aside" :class="{hidden:!$store.app.asideOpen}">
            <div class="aside-section">
                <p class="aside-title">Quick Actions</p>
                <a href="profile.html" class="aside-link"><i class="bi bi-person"></i> Profile</a>
                <a href="settings.html" class="aside-link"><i class="bi bi-gear"></i> Settings</a>
            </div>
            <div class="aside-section">
                <p class="aside-title">User</p>
                <div class="user-profile">
                    <div class="user-avatar">U</div>
                    <div class="user-info">
                        <div class="user-name" x-text="localStorage.getItem('amkyaw_user') || 'User'"></div>
                    </div>
                </div>
            </div>
            <div class="aside-section">
                <p class="aside-title">Theme</p>
                <div class="theme-toggle">
                    <label>Dark Mode</label>
                    <input type="checkbox" checked disabled>
                </div>
            </div>
        </aside>
    </div>
    
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="../js/api-client.js"></script>
    <script src="../js/chat.js"></script>
    <script>
        if(!localStorage.getItem("amkyaw_user")){var n=prompt("Enter your name:");if(n)localStorage.setItem("amkyaw_user",n);else window.location.href="../index.html";}
        function toggleSidebar(){Alpine.store("app").toggleSidebar();}
        function toggleAside(){Alpine.store("app").toggleAside();}
        function newChat(){Alpine.store("app").newChat();}
        function loadChat(i){Alpine.store("app").loadChat(i);if(innerWidth<=768)Alpine.store("app").sidebarOpen=false;}
        function delChat(i,e){e.stopPropagation();var h=Alpine.store("app").chatHistory;h.splice(i,1);localStorage.setItem("chatHistory",JSON.stringify(h));Alpine.store("app").chatHistory=h;}
        document.getElementById("chatInput").addEventListener("input",function(){this.style.height="auto";this.style.height=Math.min(this.scrollHeight,120)+"px";});
    </script>
</body>
</html>
