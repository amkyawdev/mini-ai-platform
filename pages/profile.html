<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile - AmkyawDev</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/panda.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar show">
            <button class="new-chat-btn" onclick="window.location.href='chat.html'"><i class="bi bi-plus"></i> New Chat</button>
            <nav class="sidebar-nav">
                <p class="nav-label">Navigation</p>
                <a href="chat.html" class="sidebar-link"><i class="bi bi-chat-dots"></i> Chat</a>
                <a href="docs.html" class="sidebar-link"><i class="bi bi-book"></i> Docs</a>
                <a href="about.html" class="sidebar-link"><i class="bi bi-info-circle"></i> About</a>
            </nav>
            <div class="sidebar-footer">
                <a href="settings.html" class="settings-btn"><i class="bi bi-gear"></i> Settings</a>
            </div>
        </aside>
        <main class="main-content">
            <header class="header"><span class="chat-title">Profile</span></header>
            <div class="page-container">
                <h1 class="page-title">User Profile</h1>
                <div class="card" style="text-align:center">
                    <div class="user-avatar" style="width:80px;height:80px;font-size:32px;margin:0 auto 20px">U</div>
                    <h3 id="userName">User</h3>
                    <p id="userEmail">user@example.com</p>
                </div>
            </div>
        </main>
    </div>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        document.getElementById('userName').textContent = localStorage.getItem('amkyaw_user') || 'User';
    </script>
</body>
</html>
