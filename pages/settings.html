<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - AmkyawDev</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/panda.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar show">
            <button class="new-chat-btn" onclick="window.location.href='chat.html'"><i class="bi bi-plus"></i> New Chat</button>
            <nav class="sidebar-nav">
                <p class="nav-label">Navigation</p>
                <a href="chat.html" class="sidebar-link"><i class="bi bi-chat-dots"></i> Chat</a>
                <a href="docs.html" class="sidebar-link"><i class="bi bi-book"></i> Docs</a>
                <a href="about.html" class="sidebar-link"><i class="bi bi-info-circle"></i> About</a>
            </nav>
            <div class="sidebar-footer">
                <a href="settings.html" class="settings-btn"><i class="bi bi-gear"></i> Settings</a>
            </div>
        </aside>
        <main class="main-content">
            <header class="header">
                <span class="chat-title">Settings</span>
            </header>
            <div class="page-container">
                <h1 class="page-title">Settings</h1>
                
                <div class="card">
                    <h3 class="card-title">Chat Settings</h3>
                    <div class="form-group">
                        <label>Chat Title</label>
                        <input type="text" id="chatTitle" placeholder="Chat">
                    </div>
                </div>
                
                <div class="card">
                    <h3 class="card-title">API Configuration</h3>
                    <div class="form-group">
                        <label>API Key (Groq)</label>
                        <input type="password" id="apiKey" placeholder="Enter your API key">
                    </div>
                </div>
                
                <div class="card">
                    <h3 class="card-title">Theme</h3>
                    <div class="form-group">
                        <select id="themeSelect">
                            <option value="dark">Dark Mode</option>
                            <option value="light">Light Mode</option>
                        </select>
                    </div>
                </div>
                
                <div class="card">
                    <h3 class="card-title">Data Management</h3>
                    <button class="btn btn-danger" onclick="clearAll()">Clear All Data</button>
                </div>
                
                <button class="btn btn-primary" onclick="saveSettings()">Save Settings</button>
            </div>
        </main>
    </div>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="../js/settings.js"></script>
    <script>
        // Load settings
        var s = JSON.parse(localStorage.getItem('settings') || '{"aiName":"Chat","theme":"dark","apiKey":""}');
        document.getElementById('chatTitle').value = s.aiName || '';
        document.getElementById('apiKey').value = s.apiKey || '';
        document.getElementById('themeSelect').value = s.theme || 'dark';
        
        function saveSettings() {
            var settings = {
                aiName: document.getElementById('chatTitle').value,
                apiKey: document.getElementById('apiKey').value,
                theme: document.getElementById('themeSelect').value
            };
            localStorage.setItem('settings', JSON.stringify(settings));
            alert('Settings saved!');
        }
        
        function clearAll() {
            if(confirm('Clear all data? This cannot be undone.')) {
                localStorage.clear();
                window.location.reload();
            }
        }
    </script>
</body>
</html>
