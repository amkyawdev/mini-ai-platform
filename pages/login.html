<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AmkyawDev AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">🤖</div>
            <h1 class="auth-title">Welcome to AmkyawDev</h1>
            <p class="auth-subtitle">AI Power Platform</p>
            <button class="auth-btn" onclick="login()"><i class="bi bi-box-arrow-in-right"></i> Sign In</button>
            <p class="auth-note">One-click login • No password required</p>
        </div>
    </div>
    <script src="../js/auth.js"></script>
    <script>document.addEventListener("DOMContentLoaded",function(){if(isLoggedIn())window.location.href="chat.html";});</script>
</body>
</html>
