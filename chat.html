<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - AmkyawDev</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/panda.css">
</head>
<body>
    <div class="app-container" x-data x-init="$store.app.init()">
        <aside class="sidebar" :class="{hidden:!$store.app.sidebarOpen}">
            <button class="new-chat-btn" onclick="newChat()"><i class="bi bi-plus"></i> New Chat</button>
            <nav class="sidebar-nav">
                <p class="nav-label">Navigation</p>
                <a href="chat.html" class="sidebar-link active"><i class="bi bi-chat-dots"></i> Chat</a>
                <a href="docs/index.html" class="sidebar-link"><i class="bi bi-book"></i> Docs</a>
            </nav>
            <div class="chat-history">
                <p class="history-label">Recent</p>
                <template x-for="(c,i) in $store.app.chatHistory" :key="i">
                    <div class="history-item" :data-index="i" onclick="loadChat(this.dataset.index)"><span x-text="c.title"></span><button class="delete-btn" onclick="delChat(this.parentElement.dataset.index,event)"><i class="bi bi-x"></i></button></div>
                </template>
            </div>
            <div class="sidebar-footer">
                <div class="settings-btn" onclick="openSettings()"><i class="bi bi-gear"></i> Settings</div>
            </div>
        </aside>
        <main class="main-content" :class="{expanded:!$store.app.sidebarOpen}">
            <header class="header">
                <button class="menu-btn" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
                <span class="chat-title" x-text="$store.app.loadSettings().aiName"></span>
                <div class="header-spacer"></div>
                <button class="menu-btn" onclick="openSettings()"><i class="bi bi-gear"></i></button>
            </header>
            <div class="chat-messages" id="chatMessages">
                <template x-for="(m,i) in $store.app.messages" :key="i">
                    <div class="message" :class="m.role">
                        <div class="message-avatar" :class="m.role"><span x-text="m.role==='user'?'👤':'🤖'"></span></div>
                        <div class="message-content">
                            <div class="message-bubble" x-text="m.content"></div>
                            <div class="message-time" x-text="new Date(m.time).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})"></div>
                        </div>
                    </div>
                </template>
                <div x-show="$store.app.messages.length===0" style="text-align:center;padding:60px;color:var(--text-secondary)">
                    <h3>How can I help you today?</h3>
                </div>
            </div>
            <div class="input-container" :class="{expanded:!$store.app.sidebarOpen}">
                <div class="input-wrapper">
                    <button class="upload-btn"><i class="bi bi-paperclip"></i></button>
                    <textarea class="chat-input" id="chatInput" placeholder="Type message..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()"><i class="bi bi-send"></i></button>
                </div>
            </div>
        </main>
    </div>
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <h2>Settings</h2>
            <div class="form-group"><label>AI Name</label><input type="text" id="settingsAiName"></div>
            <div class="form-group"><label>API Key</label><input type="password" id="settingsApiKey"></div>
            <div class="modal-actions">
                <button class="btn btn-danger" onclick="clearAll()">Clear</button>
                <button class="btn btn-secondary" onclick="closeSettings()">Cancel</button>
                <button class="btn btn-primary" onclick="saveSettings()">Save</button>
            </div>
        </div>
    </div>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="js/api-client.js"></script>
    <script src="js/chat.js"></script>
    <script>
        if(!localStorage.getItem("amkyaw_user")){var n=prompt("Enter your name:");if(n)localStorage.setItem("amkyaw_user",n);else window.location.href="index.html";}
        function toggleSidebar(){Alpine.store("app").toggleSidebar();}
        function openSettings(){var s=Alpine.store("app").loadSettings();document.getElementById("settingsAiName").value=s.aiName||"";document.getElementById("settingsApiKey").value=s.apiKey||"";document.getElementById("settingsModal").classList.add("show");}
        function closeSettings(){document.getElementById("settingsModal").classList.remove("show");}
        function saveSettings(){localStorage.setItem("settings",JSON.stringify({aiName:document.getElementById("settingsAiName").value,apiKey:document.getElementById("settingsApiKey").value}));closeSettings();}
        function clearAll(){if(confirm("Clear all?")){localStorage.clear();window.location.reload();}}
        function loadChat(i){Alpine.store("app").loadChat(i);if(innerWidth<=768)Alpine.store("app").sidebarOpen=false;}
        function delChat(i,e){e.stopPropagation();var h=Alpine.store("app").chatHistory;h.splice(i,1);localStorage.setItem("chatHistory",JSON.stringify(h));Alpine.store("app").chatHistory=h;}
        document.getElementById("chatInput").addEventListener("input",function(){this.style.height="auto";this.style.height=Math.min(this.scrollHeight,120)+"px";});
    </script>
</body>
</html>
