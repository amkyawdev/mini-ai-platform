<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - AmkyawDev</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/panda.css">
</head>
<body>
    <div class="app-container" x-data x-init="$store.app.init()">
        <!-- Sidebar -->
        <aside class="sidebar" :class="{ 'hidden': !$store.app.sidebarOpen }">
            <button class="new-chat-btn" onclick="newChat()">
                <i class="bi bi-plus"></i> New Chat
            </button>
            <nav class="sidebar-nav">
                <p class="nav-label">Navigation</p>
                <a href="chat.html" class="sidebar-link active"><i class="bi bi-chat-dots"></i> Chat</a>
                <a href="docs/index.html" class="sidebar-link"><i class="bi bi-book"></i> Docs</a>
            </nav>
            <div class="chat-history">
                <p class="history-label">Recent Chats</p>
                <template x-for="(chat, index) in $store.app.chatHistory" :key="index">
                    <div class="history-item" onclick="loadChatByIndex(this.dataset.index)" :data-index="index">
                        <span x-text="chat.title"></span>
                        <button class="delete-btn" onclick="deleteChat(this.parentElement.dataset.index, event)">
                            <i class="bi bi-x"></i>
                        </button>
                    </div>
                </template>
            </div>
            <div class="sidebar-footer">
                <div class="settings-btn" onclick="openSettings()">
                    <i class="bi bi-gear"></i> Settings
                </div>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="main-content" :class="{ 'expanded': !$store.app.sidebarOpen }">
            <!-- Header -->
            <header class="header">
                <button class="menu-btn" onclick="toggleSidebar()">
                    <i class="bi bi-list"></i>
                </button>
                <span class="chat-title" x-text="$store.app.loadSettings().aiName || 'AmkyawDev Chat Bot'"></span>
                <div class="header-spacer"></div>
                <button class="menu-btn" onclick="openSettings()">
                    <i class="bi bi-gear"></i>
                </button>
            </header>
            
            <!-- Messages -->
            <div class="chat-messages" id="chatMessages">
                <template x-for="(msg, index) in $store.app.messages" :key="index">
                    <div class="message" :class="msg.role">
                        <div class="message-avatar" :class="msg.role">
                            <span x-text="msg.role === 'user' ? '👤' : '🤖'"></span>
                        </div>
                        <div class="message-content">
                            <div class="message-bubble" x-html="msg.content"></div>
                            <div class="message-time" x-text="formatTime(msg.time)"></div>
                        </div>
                    </div>
                </template>
                <div x-show="$store.app.messages.length === 0" style="text-align:center;padding:60px;color:var(--text-secondary)">
                    <h3>How can I help you today?</h3>
                    <p>Send a message to start chatting</p>
                </div>
            </div>
            
            <!-- Input -->
            <div class="input-container" :class="{ 'expanded': !$store.app.sidebarOpen }">
                <div class="input-wrapper">
                    <button class="upload-btn" title="Upload file"><i class="bi bi-paperclip"></i></button>
                    <textarea class="chat-input" id="chatInput" placeholder="Type your message..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                        <i class="bi bi-send"></i>
                    </button>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Settings Modal -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <h2>Settings</h2>
            <div class="form-group">
                <label>Chat Title</label>
                <input type="text" id="settingsAiName" placeholder="AmkyawDev Chat Bot">
            </div>
            <div class="form-group">
                <label>API Key</label>
                <input type="password" id="settingsApiKey" placeholder="Enter your Groq API key">
            </div>
            <div class="modal-actions">
                <button class="btn btn-danger" onclick="clearAllData()">Clear All</button>
                <button class="btn btn-secondary" onclick="closeSettings()">Cancel</button>
                <button class="btn btn-primary" onclick="saveSettings()">Save</button>
            </div>
        </div>
    </div>
    
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/api-client.js"></script>
    <script src="js/chat.js"></script>
    <script>
        // Auth check
        if (!localStorage.getItem('amkyaw_user')) {
            const name = prompt('Enter your name:');
            if (name) localStorage.setItem('amkyaw_user', name);
            else window.location.href = 'index.html';
        }
        
        // Sidebar toggle
        function toggleSidebar() {
            const store = Alpine.store('app');
            store.toggleSidebar();
        }
        
        function closeSidebarMobile() {
            if (window.innerWidth <= 768) {
                Alpine.store('app').sidebarOpen = false;
            }
        }
        
        function loadChatByIndex(index) {
            Alpine.store('app').loadChat(index);
            closeSidebarMobile();
        }
        
        function deleteChat(index, event) {
            event.stopPropagation();
            var history = Alpine.store('app').chatHistory;
            history.splice(index, 1);
            localStorage.setItem('chatHistory', JSON.stringify(history));
            Alpine.store('app').chatHistory = history;
        }
        
        function openSettings() {
            const settings = Alpine.store('app').loadSettings();
            document.getElementById('settingsAiName').value = settings.aiName || '';
            document.getElementById('settingsApiKey').value = settings.apiKey || '';
            document.getElementById('settingsModal').classList.add('show');
        }
        
        function closeSettings() {
            document.getElementById('settingsModal').classList.remove('show');
        }
        
        function saveSettings() {
            const settings = {
                aiName: document.getElementById('settingsAiName').value,
                apiKey: document.getElementById('settingsApiKey').value
            };
            localStorage.setItem('settings', JSON.stringify(settings));
            closeSettings();
        }
        
        function clearAllData() {
            if (confirm('Clear all data?')) {
                localStorage.clear();
                window.location.reload();
            }
        }
        
        // Auto-resize textarea
        document.getElementById('chatInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });
    </script>
</body>
</html>
