<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Docs - AmkyawDev</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/panda.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar show">
            <button class="new-chat-btn" onclick="window.location.href='../chat.html'"><i class="bi bi-plus"></i> New Chat</button>
            <nav class="sidebar-nav">
                <p class="nav-label">Navigation</p>
                <a href="../chat.html" class="sidebar-link"><i class="bi bi-chat-dots"></i> Chat</a>
                <a href="index.html" class="sidebar-link active"><i class="bi bi-book"></i> Docs</a>
            </nav>
            <div class="sidebar-footer">
                <div class="settings-btn" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Logout</div>
            </div>
        </aside>
        <main class="main-content">
            <header class="header"><span class="chat-title">API Documentation</span></header>
            <div class="docs-container">
                <h1>API Documentation</h1>
                <div class="docs-section"><h2>Knowledge Engine</h2><pre><code>POST /api/answer {"question": "What is AI?"}</code></pre></div>
                <div class="docs-section"><h2>Authentication</h2><pre><code>Authorization: Bearer YOUR_API_KEY</code></pre></div>
            </div>
        </main>
    </div>
    <script>function logout(){localStorage.removeItem('amkyaw_user');window.location.href='../index.html';}</script>
</body>
</html>
